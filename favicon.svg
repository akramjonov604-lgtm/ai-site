kind = "web"
previewPath = "/"
title = "Base55 AI"
version = "1.0.0"
id = "artifacts/base55"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22040

[services.development]
run = "pnpm --filter @workspace/base55 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/base55", "run", "build" ]
publicDir = "artifacts/base55/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22040"
BASE_PATH = "/"
